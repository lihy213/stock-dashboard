body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--s50);color:var(--s800);line-height:1.6}
.header{background:linear-gradient(135deg,var(--b800),var(--b600),#0891b2);color:#fff;padding:20px 40px 14px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(30,64,175,.25)}
.header h1{font-size:1.5rem;font-weight:700}
.header .sub{font-size:.83rem;opacity:.85;margin-top:3px}
.header .meta{display:flex;gap:16px;margin-top:5px;font-size:.76rem;opacity:.75;flex-wrap:wrap;align-items:center}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;margin-right:5px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.refresh-badge{font-size:.66rem;padding:2px 8px;border-radius:12px;background:rgba(255,255,255,.15);margin-left:6px;user-select:none;transition:background .2s}
.refresh-badge:hover{background:rgba(255,255,255,.3)}
.refresh-badge.refreshing{pointer-events:none;opacity:.6}
.refresh-badge.refreshing::before{content:'⏳ ';animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.ds{font-size:.7rem;opacity:.8;margin-left:auto}
.ds-fresh{color:#86efac}.ds-stale{color:#fbbf24}.ds-error{color:#fca5a5}
.nav-tabs{display:flex;gap:4px;background:#fff;padding:10px 40px;border-bottom:1px solid var(--s200);position:sticky;top:92px;z-index:99;flex-wrap:wrap;overflow-x:auto}
.nav-tab{padding:6px 16px;border-radius:20px;font-size:.83rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--s500);transition:all .2s;white-space:nowrap}
.nav-tab:hover{background:var(--b50);color:var(--b600)}
.nav-tab.active{background:var(--b600);color:#fff}
.main{max-width:1240px;margin:0 auto;padding:22px 40px 60px}
.section{display:none}.section.active{display:block;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cg{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:#fff;border-radius:var(--rad);padding:18px 22px;box-shadow:var(--sh);border:1px solid var(--s100);transition:box-shadow .2s}
.card:hover{box-shadow:var(--sh2)}
.card-title{font-size:.95rem;font-weight:700;color:var(--s800);margin-bottom:12px}
.ml{font-size:.73rem;color:var(--s500)}.mv{font-size:1.4rem;font-weight:700;color:var(--b700)}.ms{font-size:.73rem;color:var(--s400);margin-top:2px}
.badge{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.bd-blue{background:var(--b100);color:var(--b700)}.bd-green{background:var(--g100);color:#15803d}
.bd-red{background:var(--r100);color:#b91c1c}.bd-amber{background:var(--a100);color:#92400e}
.stock-table{width:100%;border-collapse:collapse;font-size:.83rem}
.stock-table th{text-align:left;padding:8px 10px;font-size:.72rem;font-weight:600;color:var(--s500);letter-spacing:.03em;border-bottom:2px solid var(--b200);background:var(--b50);white-space:nowrap}
.stock-table td{padding:9px 10px;border-bottom:1px solid var(--s100)}
.stock-table tr:hover td{background:var(--b50)}
.sn{font-weight:600;color:var(--s800)}.sc{font-size:.7rem;color:var(--s400);margin-left:3px}
.tu{color:#dc2626;font-weight:600}.td{color:#16a34a;font-weight:600}.tf{color:var(--s400)}
.stars{color:#f59e0b;letter-spacing:1px}
.rt{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:600}
.rt-lo{background:#dcfce7;color:#15803d}.rt-md{background:#fef3c7;color:#92400e}.rt-hi{background:#fee2e2;color:#b91c1c}
.pbar{height:5px;background:var(--s200);border-radius:3px;overflow:hidden;margin-top:4px}
.pbar-f{height:100%;border-radius:3px;transition:width .8s ease}
.pb-b{background:linear-gradient(90deg,var(--b400),var(--b600))}
.pb-g{background:linear-gradient(90deg,#22c55e,#16a34a)}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:10px;top:4px;bottom:4px;width:2px;background:linear-gradient(to bottom,var(--b400),var(--b200))}
.timeline-item{position:relative;margin-bottom:16px}
.timeline-dot{position:absolute;left:-23px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--b500);border:3px solid #fff;box-shadow:0 0 0 2px var(--b300)}
.timeline-date{font-size:.73rem;color:var(--b600);font-weight:600}
.timeline-content{font-size:.83rem;color:var(--s700);margin-top:2px}
.loading-wrap{text-align:center;padding:60px 20px;color:var(--s400)}
.loading-spinner{display:inline-block;width:40px;height:40px;border:3px solid var(--s200);border-top-color:var(--b500);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--s400);font-size:.9rem}
.sector-card{cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.sector-card:hover{border-left-color:var(--b500);transform:translateX(4px)}
.footer{text-align:center;padding:22px 40px;color:var(--s400);font-size:.76rem;border-top:1px solid var(--s200)}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}.header{padding:14px 16px}.nav-tabs{padding:6px 8px;gap:2px}.nav-tab{padding:5px 10px;font-size:.76rem}.main{padding:14px 12px 40px}}
</style>
</head>
