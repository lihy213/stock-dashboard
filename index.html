body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--s50);color:var(--s800);line-height:1.6}
.header{background:linear-gradient(135deg,var(--b800),var(--b600),#0891b2);color:#fff;padding:20px 40px 14px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(30,64,175,.25)}
.header h1{font-size:1.5rem;font-weight:700}
.header .sub{font-size:.83rem;opacity:.85;margin-top:3px}
.header .meta{display:flex;gap:16px;margin-top:5px;font-size:.76rem;opacity:.75;flex-wrap:wrap;align-items:center}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;margin-right:5px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.refresh-badge{font-size:.66rem;padding:2px 8px;border-radius:12px;background:rgba(255,255,255,.15);margin-left:6px;user-select:none;transition:background .2s}
.refresh-badge:hover{background:rgba(255,255,255,.3)}
.refresh-badge.refreshing{pointer-events:none;opacity:.6}
.refresh-badge.refreshing::before{content:'⏳ ';animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.ds{font-size:.7rem;opacity:.8;margin-left:auto}
.ds-fresh{color:#86efac}.ds-stale{color:#fbbf24}.ds-error{color:#fca5a5}
.nav-tabs{display:flex;gap:4px;background:#fff;padding:10px 40px;border-bottom:1px solid var(--s200);position:sticky;top:92px;z-index:99;flex-wrap:wrap;overflow-x:auto}
.nav-tab{padding:6px 16px;border-radius:20px;font-size:.83rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--s500);transition:all .2s;white-space:nowrap}
.nav-tab:hover{background:var(--b50);color:var(--b600)}
.nav-tab.active{background:var(--b600);color:#fff}
.main{max-width:1240px;margin:0 auto;padding:22px 40px 60px}
.section{display:none}.section.active{display:block;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cg{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:#fff;border-radius:var(--rad);padding:18px 22px;box-shadow:var(--sh);border:1px solid var(--s100);transition:box-shadow .2s}
.card:hover{box-shadow:var(--sh2)}
.card-title{font-size:.95rem;font-weight:700;color:var(--s800);margin-bottom:12px}
.ml{font-size:.73rem;color:var(--s500)}.mv{font-size:1.4rem;font-weight:700;color:var(--b700)}.ms{font-size:.73rem;color:var(--s400);margin-top:2px}
.badge{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.bd-blue{background:var(--b100);color:var(--b700)}.bd-green{background:var(--g100);color:#15803d}
.bd-red{background:var(--r100);color:#b91c1c}.bd-amber{background:var(--a100);color:#92400e}
.stock-table{width:100%;border-collapse:collapse;font-size:.83rem}
.stock-table th{text-align:left;padding:8px 10px;font-size:.72rem;font-weight:600;color:var(--s500);letter-spacing:.03em;border-bottom:2px solid var(--b200);background:var(--b50);white-space:nowrap}
.stock-table td{padding:9px 10px;border-bottom:1px solid var(--s100)}
.stock-table tr:hover td{background:var(--b50)}
.sn{font-weight:600;color:var(--s800)}.sc{font-size:.7rem;color:var(--s400);margin-left:3px}
.tu{color:#dc2626;font-weight:600}.td{color:#16a34a;font-weight:600}.tf{color:var(--s400)}
.stars{color:#f59e0b;letter-spacing:1px}
.rt{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:600}
.rt-lo{background:#dcfce7;color:#15803d}.rt-md{background:#fef3c7;color:#92400e}.rt-hi{background:#fee2e2;color:#b91c1c}
.pbar{height:5px;background:var(--s200);border-radius:3px;overflow:hidden;margin-top:4px}
.pbar-f{height:100%;border-radius:3px;transition:width .8s ease}
.pb-b{background:linear-gradient(90deg,var(--b400),var(--b600))}
.pb-g{background:linear-gradient(90deg,#22c55e,#16a34a)}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:10px;top:4px;bottom:4px;width:2px;background:linear-gradient(to bottom,var(--b400),var(--b200))}
.timeline-item{position:relative;margin-bottom:16px}
.timeline-dot{position:absolute;left:-23px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--b500);border:3px solid #fff;box-shadow:0 0 0 2px var(--b300)}
.timeline-date{font-size:.73rem;color:var(--b600);font-weight:600}
.timeline-content{font-size:.83rem;color:var(--s700);margin-top:2px}
.loading-wrap{text-align:center;padding:60px 20px;color:var(--s400)}
.loading-spinner{display:inline-block;width:40px;height:40px;border:3px solid var(--s200);border-top-color:var(--b500);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--s400);font-size:.9rem}
.sector-card{cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.sector-card:hover{border-left-color:var(--b500);transform:translateX(4px)}
.footer{text-align:center;padding:22px 40px;color:var(--s400);font-size:.76rem;border-top:1px solid var(--s200)}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}.header{padding:14px 16px}.nav-tabs{padding:6px 8px;gap:2px}.nav-tab{padding:5px 10px;font-size:.76rem}.main{padding:14px 12px 40px}}
</style>
</head>

// ═══════════════════ 渲染引擎 ═══════════════════
let D=null,radarChart=null;

async function loadData(){
  const ds=document.getElementById('ds');
  const dsSource=document.getElementById('ds-source');

  // 安全网：8秒后强制隐藏loading，防止极端情况下永久卡死
  const safetyTimer=setTimeout(()=>{
    const ld=document.getElementById('loading');
    if(ld && ld.style.display!=='none'){
      ld.style.display='none';
      console.warn('⏰ 8秒安全超时：强制隐藏 loading');
    }
  },8000);

  try{
    const resp=await fetch('data.json?t='+Date.now());
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    D=await resp.json();

    // 动态读取数据源
    if(dsSource) dsSource.textContent=D.data_source||'灵犀金融Skill';

    const age=Math.round((Date.now()-new Date(D.update_time).getTime())/60000);
    if(age<60)ds.innerHTML='<span class="ds-fresh">🟢 实时</span>';
    else if(age<240)ds.innerHTML='<span class="ds-stale">🟡 '+age+'分钟前</span>';
    else ds.innerHTML='<span class="ds-stale">🕐 '+Math.round(age/60)+'小时前</span>';
    buildAll();
    document.getElementById('ft').textContent=D.update_time;
  }catch(e){
    console.error('数据加载失败:',e);
    ds.innerHTML='<span class="ds-error">⚠️ 网络异常，显示缓存</span>';
    // 第1层回退: localStorage
    const c=localStorage.getItem('sd_cache');
    if(c){
      try{
        D=JSON.parse(c);
        if(dsSource) dsSource.textContent=D.data_source||'缓存数据';
        buildAll();
        document.getElementById('ft').textContent=(D.update_time||'--');
        if(document.getElementById('loading').style.display!='none') {
          document.getElementById('loading').style.display='none';
        }
        return;
      }catch(e2){console.error('缓存解析失败:',e2);}
    }
    // 第2层回退: 内嵌离线数据 (支持 file:// 本地打开)
    const embed=document.getElementById('embedded-data');
    if(embed){
      try{
        D=JSON.parse(embed.textContent);
        if(dsSource) dsSource.textContent=(D.data_source||'灵犀金融Skill')+' (离线)';
        ds.innerHTML='<span class="ds-stale">📦 离线缓存</span>';
        buildAll();
        document.getElementById('ft').textContent=(D.update_time||'--');
        return;
      }catch(e3){console.error('内嵌数据解析失败:',e3);}
    }
    // 所有回退都失败：强制隐藏 spinner
    document.getElementById('loading').style.display='none';
  }finally{
    // 无论成功失败，清除安全计时器
    clearTimeout(safetyTimer);
  }
}

function buildAll(){
  // 绝对保证隐藏 loading（即使 D 为空）
  try{document.getElementById('loading').style.display='none';}catch(e){}
  if(!D)return;
  // 逐步渲染，每步独立 try-catch，一个坏了不影响其他

    ['NavTabs',renderNavTabs],
    ['Overview',renderOverview],
    ['SectorStocks',renderSectorStocks],
    ['Radar',drawRadar],
    ['Changelog',renderChangelog],
  ];

    try{fn();}catch(e){console.error('buildAll/'+name+' 渲染失败:',e);}
  });
  // 缓存
  try{localStorage.setItem('sd_cache',JSON.stringify(D));}catch(e){}
}

function renderSectorStocks(){
  if(!D.sectors||!D.stocks)return;
  D.sectors.forEach((sector,i)=>{
    const tabKey='sector-'+i;
    // 防止重复插入
    if(document.getElementById('sec-'+tabKey))return;
    const sectorName=sector.name;
    // Exact match first, then fuzzy
    let stocks=D.stocks.filter(st=>{
      const sn=st.sector||'';
      return sn===sectorName||sn.includes(sectorName)||sectorName.includes(sn);
    });

    // Build rows or empty state
    let rows='';
    if(stocks.length>0){
      rows=stocks.map(s=>{
        const m=META[s.code]||{};
        return `<tr>
          <td><span class="sn">${s.name}</span><span class="sc">${s.code}</span></td>
          <td>${m.sub||s.subsector||''}</td>
          <td>${s.price||'--'}</td>

          <td><span class="rt ${m.rc||'rt-md'}">${m.risk||'中'}风险</span></td>
          <td style="font-size:.73rem;color:var(--s500);max-width:150px">${m.thesis||''}</td>

      rows='<tr><td colspan="6" style="text-align:center;color:var(--s400);padding:24px">📭 该板块暂未纳入持仓跟踪，板块涨跌：<b>'+(sector.change_pct||'--')+'</b></td></tr>';

// ═══════════════════ 更新日志 ═══════════════════
async function renderChangelog(){
  const container = document.getElementById('changelog-list');
  if(!container) return;
  try{
    const resp = await fetch('changelog.json?t='+Date.now());
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const cl = await resp.json();
    if(!cl.entries||!cl.entries.length){
      container.innerHTML = '<div class="empty-state">暂无更新记录</div>';
      return;
    }
    // Show latest 20 entries, newest first
    const entries = [...cl.entries].reverse().slice(0,20);

    const tagColors = {
      '功能更新': 'badge bd-blue',
      '行情刷新': 'badge bd-green',
      '数据修复': 'badge bd-amber',
      '版本迭代': 'badge',
    };
    const tagStyle = { '功能更新':'background:var(--b100);color:var(--b700)',
      '行情刷新':'background:var(--g100);color:#15803d',
      '数据修复':'background:var(--a100);color:#92400e',
      '版本迭代':'background:var(--s200);color:var(--s500)' };

    const html = entries.map((e, i) => {
      const isLatest = i === 0;
      const cls = tagColors[e.tag||'版本迭代'] || 'badge';
      const style = tagStyle[e.tag||'版本迭代'] || '';
      return `<div class="timeline-item">
        <div class="timeline-dot" style="${isLatest?'background:var(--b600);box-shadow:0 0 0 3px var(--b300);':''}"></div>
        <div class="timeline-date">
          ${e.date} 
          <span class="${cls}" style="margin-left:8px;${style}">${e.tag}</span>
          ${isLatest?' <span style="font-size:.62rem;color:var(--b500);margin-left:4px">● 最新</span>':''}
        </div>
        <div class="timeline-content" style="${isLatest?'font-weight:600':''}">${e.message}</div>
        ${e.version?`<div style="font-size:.66rem;color:var(--s400);margin-top:2px">commit: ${e.version}</div>`:''}
      </div>`;
    }).join('');

    container.innerHTML = `
      <div class="cg" style="margin-bottom:6px">
        <div class="card" style="padding:10px 22px;background:var(--b50);text-align:center">
          <span style="font-size:.78rem;font-weight:600;color:var(--b700)">📦 ${cl.project || '项目'}</span>
          ${cl.repo?`<span style="margin-left:12px;font-size:.72rem;color:var(--s400)"><a href="${cl.repo}" style="color:var(--b500)">GitHub</a></span>`:''}
          <span style="margin-left:12px;font-size:.72rem;color:var(--s400)">共 ${entries.length} 条记录</span>
        </div>
      </div>
      <div class="timeline">${html}</div>`;
  }catch(e){
    console.error('Changelog load failed:', e);
    container.innerHTML = '<div class="empty-state">⚠️ 更新日志加载失败，请刷新重试</div>';
  }
}
function switchTab(key){
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===key));
  document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id==='sec-'+key));
}

function switchToSector(name){
  if(!D||!D.sectors)return;
  const idx=D.sectors.findIndex(s=>s.name===name);
  if(idx>=0)switchTab('sector-'+idx);
}

// ═══════════════════ 手动刷新 + 自动刷新 ═══════════════════
let autoRefreshTimer=null;

async function refreshData(){
  const btn=document.getElementById('refresh-btn');
  if(!btn||btn.classList.contains('refreshing'))return;
  btn.classList.add('refreshing');
  btn.textContent='⏳ 刷新中...';

  // 清理旧数据（允许 loadData 重新渲染）
  D=null;
  document.querySelectorAll('.section').forEach(s=>s.remove());
  // 清理动态板块标签
  document.querySelectorAll('#nav-tabs .nav-tab[id^="tab-sector-"]').forEach(b=>b.remove());
  // 销毁旧雷达图
  if(radarChart){radarChart.destroy();radarChart=null;}

  try{
    // 重新加载（10秒超时保护，防止 fetch 卡死）
    await Promise.race([
      loadData(),
      new Promise((_,reject)=>setTimeout(()=>reject(new Error('刷新超时(10s)')),10000))
    ]);
  }catch(e){
    console.error('刷新失败:',e.message);
    // 兜底：如果 D 仍为空且刷新失败，用内嵌数据重建
    if(!D){
      const embed=document.getElementById('embedded-data');
      if(embed){
        try{D=JSON.parse(embed.textContent);buildAll();}catch(e2){}
      }
    }
    // 显示错误提示
    const ds=document.getElementById('ds');
    if(ds)ds.innerHTML='<span class="ds-error">⚠️ 刷新失败，使用缓存</span>';
  }finally{
    // 无论如何都要恢复按钮状态
    btn.classList.remove('refreshing');
    btn.textContent='🔄 刷新';
    btn.title='上次刷新: '+new Date().toLocaleTimeString('zh-CN');
  }
}

function toggleAutoRefresh(){
  const cb=document.getElementById('auto-refresh');
  if(!cb)return;
  if(cb.checked){
    // 5分钟自动刷新
    autoRefreshTimer=setInterval(refreshData,5*60*1000);
    console.log('🔄 自动刷新已开启（每5分钟）');
  }else{
    if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null;}
    console.log('⏸ 自动刷新已关闭');
  }
}

// ═══════════════════ 启动 ═══════════════════
loadData();
